name: Upload Artifact Workflow

on:
  push:
    branches: [ main ]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Show app.txt content
        run: cat app.txt

      - name: Append new line to app.txt
        run: echo "download this file in another job" >> app.txt

      - name: Upload app.txt as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-txt-file
          path: app.txt
 
  download:
    runs-on: ubuntu-latest
    needs: upload

    steps:
     - name: Download artifact
       uses: actions/download-artifact@v4
       with:
         name: app-txt-file  

     - name: Cat downloaded file 
       run: cat app.txt
